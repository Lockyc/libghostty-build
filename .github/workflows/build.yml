name: Build GhosttyKit

# Builds GhosttyKit.xcframework (Ghostty's macOS embedding framework) from the
# commit pinned in GHOSTTY_REF, and publishes it as a release asset that warden
# vendors. Manual for now — bumping GHOSTTY_REF and re-running is the release.
on:
  workflow_dispatch:
    inputs:
      ghostty_ref:
        description: "Override Ghostty ref (tag/branch/SHA). Empty = use GHOSTTY_REF file."
        required: false
        type: string
        default: ""

permissions:
  contents: write        # create the release
  id-token: write        # build provenance attestation
  attestations: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15    # NOT macos-26: Zig 0.15.2 links the 15.x SDK, not the 26 SDK
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Ghostty ref
        id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REF: ${{ github.event.inputs.ghostty_ref }}
        run: |
          REF="${INPUT_REF:-$(tr -d '[:space:]' < GHOSTTY_REF)}"
          [ -n "$REF" ] || { echo "[!] no ref (empty input and GHOSTTY_REF)"; exit 1; }
          SHA=$(gh api "repos/ghostty-org/ghostty/commits/$REF" --jq '.sha')
          [ -n "$SHA" ] || { echo "[!] could not resolve $REF to a commit"; exit 1; }
          echo "ref=$REF"         >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"         >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "[*] $REF -> $SHA"

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone Ghostty @ pinned sha
        run: |
          git clone --filter=blob:none https://github.com/ghostty-org/ghostty ghostty-src
          git -C ghostty-src checkout --detach "${{ steps.r.outputs.sha }}"

      - name: Build GhosttyKit.xcframework (universal)
        run: ./scripts/build-xcframework.sh "$PWD/ghostty-src" "$PWD/dist"

      - name: Package + checksum
        run: |
          set -euo pipefail
          cd dist
          ditto -c -k --sequesterRsrc --keepParent GhosttyKit.xcframework GhosttyKit.xcframework.zip
          shasum -a 256 GhosttyKit.xcframework.zip | tee GhosttyKit.xcframework.zip.sha256
          # Resources zip holds terminfo/ + ghostty/ at its ROOT (no --keepParent), so a
          # consumer unpacks it straight into an app bundle's Contents/Resources.
          ditto -c -k --sequesterRsrc GhosttyResources GhosttyResources.zip
          shasum -a 256 GhosttyResources.zip | tee GhosttyResources.zip.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/GhosttyKit.xcframework.zip
            dist/GhosttyResources.zip

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ghostty-${{ steps.r.outputs.short }}"
          # No apostrophes in NOTES: the heredoc sits inside $( ), where bash still parses the body
          # for quotes, so a lone ' fails the whole step with "unexpected EOF while looking for `''".
          NOTES=$(cat <<EOF
          Two assets, both built from **unmodified** upstream Ghostty via its own
          \`-Demit-xcframework\` build graph:

          - **\`GhosttyKit.xcframework.zip\`** — universal macOS (arm64 + x86_64) static libghostty.
          - **\`GhosttyResources.zip\`** — the runtime resources (\`terminfo/\` + \`ghostty/shell-integration/\`),
            unpacked straight into the \`Contents/Resources\` of an embedding app bundle.
            **Required**: libghostty probes for \`Contents/Resources/terminfo/78/xterm-ghostty\` and
            silently falls back to \`TERM=xterm-256color\` without it, which costs synchronized
            output (DEC 2026), styled underlines, and shell integration.

          - ref: \`${{ steps.r.outputs.ref }}\`
          - sha: \`${{ steps.r.outputs.sha }}\`

          Zig 0.15.2, \`macos-15\` runner. Consumed by [warden](https://github.com/lockyc/warden)
          via \`just revendor-ghostty\`. Verify with the attached \`.sha256\` files and the GitHub
          build provenance attestation.
          EOF
          )
          cd dist
          ASSETS="GhosttyKit.xcframework.zip GhosttyKit.xcframework.zip.sha256 GhosttyResources.zip GhosttyResources.zip.sha256"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            $ASSETS \
            || { gh release upload "$TAG" $ASSETS --clobber; gh release edit "$TAG" --notes "$NOTES"; }
