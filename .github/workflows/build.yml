name: Build GhosttyKit

# Builds GhosttyKit.xcframework (Ghostty's macOS embedding framework) from the
# commit pinned in GHOSTTY_REF, and publishes it as a release asset that warden
# vendors. Manual for now — bumping GHOSTTY_REF and re-running is the release.
on:
  workflow_dispatch:
    inputs:
      ghostty_ref:
        description: "Override Ghostty ref (tag/branch/SHA). Empty = use GHOSTTY_REF file."
        required: false
        type: string
        default: ""

permissions:
  contents: write        # create the release
  id-token: write        # build provenance attestation
  attestations: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15    # NOT macos-26: Zig 0.15.2 links the 15.x SDK, not the 26 SDK
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Ghostty ref
        id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REF: ${{ github.event.inputs.ghostty_ref }}
        run: |
          REF="${INPUT_REF:-$(tr -d '[:space:]' < GHOSTTY_REF)}"
          [ -n "$REF" ] || { echo "[!] no ref (empty input and GHOSTTY_REF)"; exit 1; }
          SHA=$(gh api "repos/ghostty-org/ghostty/commits/$REF" --jq '.sha')
          [ -n "$SHA" ] || { echo "[!] could not resolve $REF to a commit"; exit 1; }
          echo "ref=$REF"         >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"         >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "[*] $REF -> $SHA"

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone Ghostty @ pinned sha
        run: |
          git clone --filter=blob:none https://github.com/ghostty-org/ghostty ghostty-src
          git -C ghostty-src checkout --detach "${{ steps.r.outputs.sha }}"

      - name: Build GhosttyKit.xcframework (universal)
        run: ./scripts/build-xcframework.sh "$PWD/ghostty-src" "$PWD/dist"

      - name: Package + checksum
        run: |
          set -euo pipefail
          cd dist
          ditto -c -k --sequesterRsrc --keepParent GhosttyKit.xcframework GhosttyKit.xcframework.zip
          shasum -a 256 GhosttyKit.xcframework.zip | tee GhosttyKit.xcframework.zip.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/GhosttyKit.xcframework.zip

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ghostty-${{ steps.r.outputs.short }}"
          NOTES=$(cat <<EOF
          GhosttyKit.xcframework — universal macOS (arm64 + x86_64) static libghostty.

          Built from **unmodified** upstream Ghostty via its own \`-Demit-xcframework\` build graph:
          - ref: \`${{ steps.r.outputs.ref }}\`
          - sha: \`${{ steps.r.outputs.sha }}\`

          Zig 0.15.2, \`macos-15\` runner. Consumed by [warden](https://github.com/lockyc/warden)
          via \`just revendor-ghostty\`. Verify with the attached \`.sha256\` and the GitHub build
          provenance attestation.
          EOF
          )
          cd dist
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            GhosttyKit.xcframework.zip GhosttyKit.xcframework.zip.sha256 \
            || gh release upload "$TAG" GhosttyKit.xcframework.zip GhosttyKit.xcframework.zip.sha256 --clobber
